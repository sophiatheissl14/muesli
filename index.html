<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Müsli Steuerung</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 16px; }
    button { padding: 12px 16px; margin: 6px; font-size: 16px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 420px; }
    .wide { grid-column: span 2; }
    #status { margin-top: 12px; }
  </style>
</head>
<body>
  <h2>Müsli Steuerung (BLE)</h2>

  <button id="btnConnect">Connect</button>
  <div id="status">Status: nicht verbunden</div>

  <div class="grid" style="margin-top:16px;">
    <button id="btn1" disabled>Rezept 1</button>
    <button id="btn2" disabled>Rezept 2</button>
    <button id="btn3" disabled>Rezept 3</button>
    <button id="btn4" disabled>Rezept 4</button>
    <button id="btn5" disabled>Rezept 5</button>
    <button id="btn6" disabled>Rezept 6</button>
    <button id="btnStop" class="wide" disabled>STOP</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
